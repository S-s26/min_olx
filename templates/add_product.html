{% extends "base.html" %}
{% block title %}<title>Add Product</title>{% endblock %}

{% block content %}
<h1>Add Product</h1>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    {{ formset.management_form }}
    {% for img_form in formset %}
        {{ img_form.image.label_tag }} {{ img_form.image }}
    {% endfor %}
    <button type="submit">Add Product</button>
</form>

{% endblock %}
